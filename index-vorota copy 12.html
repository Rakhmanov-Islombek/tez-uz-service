<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Автоматические ворота (установка и ремонт)</title>
    <link rel="stylesheet" href="style-vorota.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body>
    <div class="container">
        <header>
            <nav>
                <div class="icon-1"><a class="back" href="./index.html"><i class="fa-solid fa-angle-left"></i></a></div>
                <div class="logo">
                    <img class="logo-img" src="./img/5316810780059571375_109.jpg" alt="">
                    <h2 class="logo-h2">UZ Service</h2>
                </div>
                <div class="icon-2"><i class="fa-solid fa-magnifying-glass"></i></div>
            </nav>
        </header>
    </div>


    <main>
        <div class="container">
            <div class="main-text">
            <h2 class="main-h2">Кровельные работы</h2>
            <h4 class="main-h4">Найдено 3 специалистов</h4>
            </div>
            <div class="box-flex">
                <div class="box">
                    <h2 class="about-h2">Строй Мастер</h2>
                    <p class="box-comments"><i class="fa-solid fa-star"></i> 4.8 <span>(127 отзывов)</span></p>
                    <p class="box-location"><i class="fa-solid fa-location-dot"></i> <span>Ташкент, Юнусабадский р-н</span></p>
                    <p class="box-experience">5+ лет опыта</p>
                    <div class="btns">
                        <button class="btn-call"><i class="fa-solid fa-phone"></i> Позвонить</button>
                        <button class="btn-email"><i class="fa-regular fa-envelope"></i></button>
                    </div>
                </div>
                <div class="box">
                    <h2 class="about-h2">Профи Строй</h2>
                    <p class="box-comments"><i class="fa-solid fa-star"></i> 4.9 <span>(203 отзывов)</span></p>
                    <p class="box-location"><i class="fa-solid fa-location-dot"></i> <span>Ташкент, Мирзо-Улугбекский р-н</span></p>
                    <p class="box-experience">7+ лет опыта</p>
                    <div class="btns">
                        <button class="btn-call"><i class="fa-solid fa-phone"></i> Позвонить</button>
                        <button class="btn-email"><i class="fa-regular fa-envelope"></i></button>
                    </div>
                </div>
                <div class="box">
                    <h2 class="about-h2">Быстрый Ремонт</h2>
                    <p class="box-comments"><i class="fa-solid fa-star"></i> 4.7 <span>(89 отзывов)</span></p>
                    <p class="box-location"><i class="fa-solid fa-location-dot"></i> <span>Ташкент, Яккасарайский р-н</span></p>
                    <p class="box-experience">3+ лет опыта</p>
                    <div class="btns">
                        <button class="btn-call"><i class="fa-solid fa-phone"></i> Позвонить</button>
                        <button class="btn-email"><i class="fa-regular fa-envelope"></i></button>
                    </div>
                </div>
            </div>
        </div>
    </main>
</body>
</html>
